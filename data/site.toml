quickfacts = [
  "Your Windows VST plugins still work — bring your whole library",
  "Audio is ready the moment you boot up, no setup required",
  "Updates can't break your system — roll back if anything goes wrong",
]

[[features]]
eyebrow = "Ready on day one"
title = "Plug in and record. No configuration rabbit holes."
body = "On Windows, getting low-latency audio often means fighting ASIO drivers, buffer settings, and background processes. Caracal arrives already configured for music production — your audio interface works, your latency is low, and you can start a session without touching a single setting."

[[features]]
eyebrow = "A real studio toolkit, included"
title = "Professional DAWs and plugins are already installed."
body = "Ardour and Qtractor are included out of the box and ready to open. REAPER, Renoise, and Bitwig — popular with producers coming from Windows — are one click away in the bundled software installer."

[[features]]
eyebrow = "Plugins included"
title = "A full set of production-quality effects and instruments, ready to use."
body = "Reverbs, EQs, compressors, a guitar amp modeler, synths, and more come pre-installed and organized. You get a working signal chain from day one without hunting down free plugins across the web."

[[features]]
eyebrow = "Your Windows plugins come with you"
title = "Run your existing VST library, not just Linux alternatives."
body = "Caracal includes built-in support for running Windows VST plugins on Linux. If you have a plugin library from your Windows setup, you don't have to leave it behind — most plugins load and run without any extra steps."

[[features]]
eyebrow = "A system that stays stable"
title = "Updates can't break your studio setup."
body = "Unlike a traditional Windows or Linux install, Caracal's system files are locked — apps and updates can't quietly corrupt the foundation your studio runs on. Every system update is applied as a clean snapshot, and if an update causes problems, you can boot back into the previous version in seconds."

[[workflow]]
title = "Mix in Ardour without fighting the software"
caption = "Ardour's mixer handles large sessions cleanly — all your channels, sends, and plugins in one view, without the clutter."
image = "/assets/images/screenshots/Ardour-Project-Mixer.png"

[[workflow]]
title = "Record, arrange, and produce natively"
caption = "Everything you need to write and record is included from day one — no chasing downloads, no driver setup, no compatibility headaches."
image = "/assets/images/screenshots/Ardour-Project.png"

[[workflow]]
title = "Use the DAW you already know"
caption = "If you're coming from REAPER or Bitwig on Windows, they install cleanly and work exactly as you'd expect."
image = "/assets/images/screenshots/Reaper-Project.png"

[[workflow]]
title = "Your Windows plugins, running on Linux"
caption = "Caracal includes built-in tools to run most Windows VST plugins. Your existing library doesn't have to collect dust."
image = "/assets/images/screenshots/Arturia-Pigments-in-Bitwig.png"
linkurl = "/wiki/"
linkcta = "Check plugin compatibility"


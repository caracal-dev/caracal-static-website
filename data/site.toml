[[installsteps]]
number = "01"
title = "Switch to Caracal"
detail = "If you're already on a compatible Linux desktop, one command switches you over to Caracal. Alternatively, install any Fedora Atomic image first, then switch."
command = "sudo bootc switch ghcr.io/caracal-dev/caracal:latest"

[[installsteps]]
number = "02"
title = "Run the first-time setup"
detail = "A single command sets up everything your audio interface needs — low-latency permissions, Windows plugin support, and a few quality-of-life tweaks."
command = "ujust first-run"

[[installsteps]]
number = "03"
title = "Add your software"
detail = "Open the bundled software installer to browse and install DAWs, instruments, and effects. Or install individual apps with the focused helpers."
command = "ujust software-installer"
